<div class="card" [routerLink]="['/books', book.id]">
    <div class="card-cover">
        <img
                [src]="book.cover_image || ''"
                [alt]="book.title"
                onerror="this.src='https://placehold.co/180x260?text=No+Cover'"
        />
    </div>
    <div class="card-body">
        <div class="card-title">{{ book.title }}</div>
        <div class="card-author">by {{ book.author_name }}</div>
        <div class="card-rating">
            <span class="stars">{{ getStars(book.average_rating) }}</span>
            <span class="rating-val" *ngIf="book.average_rating">{{ book.average_rating }}</span>
            <span class="rating-count" *ngIf="book.average_rating">(ratings)</span>
        </div>
        <div class="card-tags">
            <span class="tag" *ngIf="book.genre">{{ book.genre }}</span>
            <span class="tag">Fiction</span>
        </div>
        <div class="card-actions">
            <button class="btn-fav" (click)="$event.stopPropagation()">❤️ {{ book.genre || 'Fiction' }}</button>
            <button class="btn-remove" (click)="$event.stopPropagation()">Remove</button>
        </div>
    </div>
</div>
