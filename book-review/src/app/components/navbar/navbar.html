<nav class="navbar">
    <div class="nav-inner">
        <div class="nav-left">
            <a routerLink="/books" class="logo">
                <span class="logo-icon">
                    <img src="/icons/mainbook.png" alt="logo">
                </span>
                <span class="logo-text">BookVerse</span>
            </a>
            <div class="nav-links">
                <a routerLink="/books" routerLinkActive="active">Books</a>
                <a routerLink="/authors" routerLinkActive="active">Authors</a>
                <a href="#">Reviews</a>
            </div>
        </div>



        <div class="nav-right">
            <ng-container *ngIf="!username">
                <a routerLink="/login" class="auth-btn">Login</a>
                <a routerLink="/register" class="auth-btn auth-btn--primary">Register</a>
            </ng-container>

            <div class="user-chip" *ngIf="username">
                <div class="avatar initials-avatar">
                    {{ username[0] | uppercase }}
                </div>
                <span>{{ username }}</span>
                <span class="chevron" (click)="logout()" style="cursor:pointer" title="Выйти">⏻</span>
            </div>
        </div>
    </div>
</nav>
