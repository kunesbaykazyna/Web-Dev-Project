<nav class="navbar">
    <div class="nav-inner">
        <div class="nav-left">
            <a routerLink="/books" class="logo">
                <span class="logo-icon">📖</span>
                <span class="logo-text">BookVerse</span>
            </a>
            <div class="nav-links">
                <a routerLink="/books" routerLinkActive="active">Books</a>
                <a routerLink="/authors" routerLinkActive="active">Authors</a>
                <a href="#">Reviews</a>
            </div>
        </div>



        <div class="searchborder1">
            <div class="nav-center1">
                <div class="search-wrap1">
                    <input
                            type="text"
                            placeholder="Search books, authors..."
                            [(ngModel)]="search"
                            (ngModelChange)="onSearchChange($event)"
                    />
                </div>
            </div>
        </div>

        <div class="nav-right">
            <ng-container *ngIf="!username">
                <a routerLink="/login" class="auth-btn">Login</a>
                <a routerLink="/register" class="auth-btn auth-btn--primary">Register</a>
            </ng-container>

            <div class="user-chip" *ngIf="username">
                <img src="https://i.pravatar.cc/32" alt="avatar" class="avatar" />
                <span>{{ username }}</span>
                <span class="chevron" (click)="logout()" style="cursor:pointer" title="Выйти">⏻</span>
            </div>
        </div>
    </div>
</nav>
